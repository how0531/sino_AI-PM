<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850">
    <!-- 定義樣式與濾鏡 -->
    <defs>
        <!-- 卡片發光陰影 -->
        <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
        </filter>
        <!-- 金色高亮發光 -->
        <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <!-- 漸層定義 -->
        <linearGradient id="grad-header" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C43826" />
            <stop offset="100%" stop-color="#DAA360" />
        </linearGradient>
        <linearGradient id="grad-copilot" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#25334a" />
            <stop offset="100%" stop-color="#1f2c40" />
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1200" height="850" fill="#172439" rx="16"/>

    <!-- 頂部標題區 -->
    <rect x="0" y="0" width="1200" height="80" fill="#0f1827" rx="16"/>
    <rect x="50" y="76" width="1100" height="4" fill="url(#grad-header)"/>
    <text x="600" y="48" font-family="'Noto Sans TC', sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">全方位企業增效 Agent 運作架構圖</text>

    <!-- 左側：核心入口區 -->
    <g transform="translate(40, 110)">
        <rect width="260" height="690" fill="#0f1827" stroke="rgba(171, 188, 207, 0.15)" stroke-width="1.5" rx="12" filter="url(#card-shadow)"/>
        <text x="130" y="35" font-family="'Noto Sans TC', sans-serif" font-size="16" font-weight="bold" fill="#DAA360" text-anchor="middle">使用者入口與對話中樞</text>
        <line x1="20" y1="50" x2="240" y2="50" stroke="rgba(171, 188, 207, 0.2)" stroke-width="1"/>

        <!-- 入口管道卡片 -->
        <rect x="20" y="70" width="220" height="80" fill="#25334a" stroke="rgba(171, 188, 207, 0.2)" rx="8"/>
        <text x="130" y="105" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">使用者端</text>
        <text x="130" y="125" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF" text-anchor="middle">Teams 訊息 / 網頁介面</text>

        <!-- 連接線 -->
        <path d="M 130,150 L 130,195" stroke="#DAA360" stroke-width="2" fill="none"/>
        <polygon points="130,200 126,190 134,190" fill="#DAA360"/>

        <!-- Copilot Studio 核心 -->
        <rect x="20" y="200" width="220" height="450" fill="url(#grad-copilot)" stroke="#DAA360" stroke-width="1.5" rx="8" filter="url(#card-shadow)"/>
        <rect x="30" y="215" width="200" height="30" fill="#C43826" rx="4"/>
        <text x="130" y="235" font-family="'Noto Sans TC', sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Copilot Studio</text>
        
        <!-- 5個 Agent 分流展示 -->
        <g transform="translate(30, 260)">
            <!-- Agent 1 -->
            <rect x="0" y="0" width="200" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="10" y="25" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#E4E9F4">1. 數據 Agent</text>
            <text x="10" y="45" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">自然語言轉 SQL 查詢</text>

            <!-- Agent 2 -->
            <rect x="0" y="75" width="200" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="10" y="100" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#E4E9F4">2. 時程管理 Agent</text>
            <text x="10" y="120" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">主動查核與智慧催辦</text>

            <!-- Agent 3 -->
            <rect x="0" y="150" width="200" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="10" y="175" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#E4E9F4">3. 提案 Agent</text>
            <text x="10" y="195" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">外部競品檢索與 User Story</text>

            <!-- Agent 4 -->
            <rect x="0" y="225" width="200" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="10" y="250" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#E4E9F4">4. KPI 管理 Agent</text>
            <text x="10" y="270" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">數據對比與 Gap 分析</text>

            <!-- Agent 5 -->
            <rect x="0" y="300" width="200" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="10" y="325" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#E4E9F4">5. 會議記錄 Agent</text>
            <text x="10" y="345" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">摘要提取與一鍵 Jira 派單</text>
        </g>
    </g>

    <!-- 中間：Power Automate 邏輯中樞 -->
    <g transform="translate(370, 110)">
        <rect width="450" height="690" fill="#0f1827" stroke="rgba(171, 188, 207, 0.15)" stroke-width="1.5" rx="12" filter="url(#card-shadow)"/>
        <text x="225" y="35" font-family="'Noto Sans TC', sans-serif" font-size="16" font-weight="bold" fill="#DAA360" text-anchor="middle">Power Automate Flow 邏輯調度區</text>
        <line x1="20" y1="50" x2="430" y2="50" stroke="rgba(171, 188, 207, 0.2)" stroke-width="1"/>

        <!-- 數據流通道 1 -->
        <g transform="translate(20, 70)">
            <rect width="410" height="90" fill="#25334a" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="15" y="25" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">數據 Flow 通道</text>
            <text x="15" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">1. 語意解析</text>
            <text x="110" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="130" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">2. API 轉換</text>
            <text x="210" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="230" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">3. 查詢 Cube/神策</text>
            <text x="340" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="360" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ffffff">回傳 HTML 表格</text>
        </g>

        <!-- 數據流通道 2 -->
        <g transform="translate(20, 190)">
            <rect width="410" height="90" fill="#25334a" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="15" y="25" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">時程催辦 Flow 通道</text>
            <text x="15" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">1. 掃描 Planner 看板</text>
            <text x="150" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="170" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">2. 篩選逾期</text>
            <text x="250" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="270" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">3. AI 生成委婉私訊</text>
            <text x="380" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="395" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ffffff">發送</text>
        </g>

        <!-- 數據流通道 3 -->
        <g transform="translate(20, 310)">
            <rect width="410" height="90" fill="#25334a" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="15" y="25" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">提案分析 Flow 通道</text>
            <text x="15" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">1. 接收產品點子</text>
            <text x="140" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="160" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">2. 外部 Web Search</text>
            <text x="280" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="300" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ffffff">生成 User Story 矩陣</text>
        </g>

        <!-- 數據流通道 4 -->
        <g transform="translate(20, 430)">
            <rect width="410" height="90" fill="#25334a" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="15" y="25" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">KPI 落差 Flow 通道</text>
            <text x="15" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">1. 讀取 SharePoint KPI</text>
            <text x="160" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="180" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">2. 比對現況</text>
            <text x="260" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="280" y="50" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ffffff">輸出 Gap 警示與推薦策略</text>
        </g>

        <!-- 數據流通道 5 -->
        <g transform="translate(20, 550)">
            <rect width="410" height="110" fill="#25334a" stroke="#DAA360" stroke-width="1" rx="8"/>
            <text x="15" y="25" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#DAA360">會議派單 Flow 通道 (工作閉環核心)</text>
            <text x="15" y="55" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">1. 接收會議逐字稿</text>
            <text x="140" y="55" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="160" y="55" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">2. GPT 提取待辦</text>
            <text x="270" y="55" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#DAA360">➜</text>
            <text x="290" y="55" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ABBCCF">3. PM 點選確認</text>
            
            <path d="M 200,68 L 200,88" stroke="#DAA360" stroke-width="1.5" fill="none"/>
            <polygon points="200,93 197,85 203,85" fill="#DAA360"/>
            <text x="210" y="85" font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#ffffff">自動呼叫 Jira/Planner Connector 派單</text>
        </g>
    </g>

    <!-- 右側：企業系統與資安防護區 -->
    <g transform="translate(890, 110)">
        <rect width="270" height="690" fill="#0f1827" stroke="rgba(171, 188, 207, 0.15)" stroke-width="1.5" rx="12" filter="url(#card-shadow)"/>
        <text x="135" y="35" font-family="'Noto Sans TC', sans-serif" font-size="16" font-weight="bold" fill="#DAA360" text-anchor="middle">資料庫與協作系統</text>
        <line x1="20" y1="50" x2="250" y2="50" stroke="rgba(171, 188, 207, 0.2)" stroke-width="1"/>

        <!-- 串接項目 -->
        <g transform="translate(20, 70)">
            <!-- 數據源 -->
            <rect x="0" y="0" width="230" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="15" y="25" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">企業數據源</text>
            <text x="15" y="45" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">Cube 資料庫 / 神策數據 API</text>

            <!-- 專案工具 -->
            <rect x="0" y="80" width="230" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="15" y="105" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">專案協作工具</text>
            <text x="15" y="125" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">Jira Cloud / Microsoft Planner</text>

            <!-- 溝通管道 -->
            <rect x="0" y="160" width="230" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="15" y="185" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">即時通訊服務</text>
            <text x="15" y="205" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">Microsoft Teams 私訊通道</text>

            <!-- 目標設定 -->
            <rect x="0" y="240" width="230" height="60" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="6"/>
            <text x="15" y="265" font-family="'Noto Sans TC', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">SharePoint 企業雲端</text>
            <text x="15" y="285" font-family="'Noto Sans TC', sans-serif" font-size="10" fill="#ABBCCF">SharePoint Excel 季度 KPI 目標</text>
        </g>

        <!-- 安全防護罩標示 -->
        <rect x="20" y="440" width="230" height="210" fill="rgba(196, 56, 38, 0.05)" stroke="#C43826" stroke-width="1.5" rx="8"/>
        <text x="135" y="475" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#C43826" text-anchor="middle">資安與防護牆控管 (DLP)</text>
        <line x1="40" y1="490" x2="230" y2="490" stroke="rgba(196, 56, 38, 0.2)" stroke-width="1"/>
        
        <g font-family="'Noto Sans TC', sans-serif" font-size="11" fill="#E4E9F4">
            <text x="40" y="520">• 整合 Azure AD SSO 單一登入</text>
            <text x="40" y="545">• API 連動 Windows 使用者帳權</text>
            <text x="40" y="570">• 敏感客戶資料動態去識別化</text>
            <text x="40" y="595">• 傳輸全程 TLS 1.3 協議加密</text>
            <text x="40" y="620">• 禁止未授權外部資料外洩</text>
        </g>
    </g>

    <!-- 中央連接流向線 (左到中，中到右) -->
    <!-- 左區到中區 -->
    <path d="M 300,210 L 370,210" stroke="#ABBCCF" stroke-width="1" stroke-dasharray="4,4" fill="none"/>
    <path d="M 300,330 L 370,330" stroke="#ABBCCF" stroke-width="1" stroke-dasharray="4,4" fill="none"/>
    <path d="M 300,450 L 370,450" stroke="#ABBCCF" stroke-width="1" stroke-dasharray="4,4" fill="none"/>
    <path d="M 300,570 L 370,570" stroke="#ABBCCF" stroke-width="1" stroke-dasharray="4,4" fill="none"/>
    
    <!-- 中區到右區 -->
    <path d="M 820,210 L 890,210" stroke="#ABBCCF" stroke-width="1.5" fill="none"/>
    <polygon points="890,210 882,206 882,214" fill="#ABBCCF"/>
    
    <path d="M 820,335 L 890,335" stroke="#ABBCCF" stroke-width="1.5" fill="none"/>
    <polygon points="890,335 882,331 882,339" fill="#ABBCCF"/>
    
    <path d="M 820,455 L 890,455" stroke="#ABBCCF" stroke-width="1.5" fill="none"/>
    <polygon points="890,455 882,451 882,459" fill="#ABBCCF"/>

    <path d="M 820,575 L 890,575" stroke="#DAA360" stroke-width="2" fill="none"/>
    <polygon points="890,575 880,570 880,580" fill="#DAA360"/>
</svg>
