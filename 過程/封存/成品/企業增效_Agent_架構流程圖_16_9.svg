<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
    <!-- 定義樣式與濾鏡 -->
    <defs>
        <!-- 卡片發光陰影 -->
        <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
        <!-- 漸層定義 -->
        <linearGradient id="grad-header" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C43826" />
            <stop offset="100%" stop-color="#DAA360" />
        </linearGradient>
        <linearGradient id="grad-copilot" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#25334a" />
            <stop offset="100%" stop-color="#1f2c40" />
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1920" height="1080" fill="#172439" rx="20"/>

    <!-- 頂部標題區 (字體放大，置中對齊優化) -->
    <rect x="0" y="0" width="1920" height="115" fill="#0f1827" rx="20"/>
    <rect x="60" y="111" width="1800" height="4" fill="url(#grad-header)"/>
    <text x="960" y="70" font-family="'Noto Sans TC', sans-serif" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">AI PM 專案經理特助：全方位企業增效 Agent 架構流程圖</text>

    <!-- 左側：對話與意圖中樞 (寬度 400, 高度 880) -->
    <g transform="translate(60, 145)">
        <rect width="400" height="880" fill="#0f1827" stroke="rgba(171, 188, 207, 0.15)" stroke-width="2" rx="16" filter="url(#card-shadow)"/>
        <text x="200" y="45" font-family="'Noto Sans TC', sans-serif" font-size="20" font-weight="bold" fill="#DAA360" text-anchor="middle" letter-spacing="1">使用者入口與對話中樞</text>
        <line x1="30" y1="65" x2="370" y2="65" stroke="rgba(171, 188, 207, 0.2)" stroke-width="1.5"/>

        <!-- 使用者入口卡片 -->
        <rect x="30" y="90" width="340" height="100" fill="#25334a" stroke="rgba(171, 188, 207, 0.2)" rx="10"/>
        <text x="200" y="135" font-family="'Noto Sans TC', sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">企業使用者端</text>
        <text x="200" y="160" font-family="'Noto Sans TC', sans-serif" font-size="14" fill="#ABBCCF" text-anchor="middle">Microsoft Teams / 網頁嵌入介面</text>

        <!-- 連接線 -->
        <path d="M 200,190 L 200,245" stroke="#DAA360" stroke-width="3" fill="none"/>
        <polygon points="200,252 195,238 205,238" fill="#DAA360"/>

        <!-- Copilot Studio 核心 -->
        <rect x="30" y="255" width="340" height="595" fill="url(#grad-copilot)" stroke="#DAA360" stroke-width="2" rx="10" filter="url(#card-shadow)"/>
        <rect x="45" y="275" width="310" height="40" fill="#C43826" rx="6"/>
        <text x="200" y="301" font-family="'Noto Sans TC', sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Microsoft Copilot Studio 意圖解析</text>
        
        <!-- 5大 Agent 分流 -->
        <g transform="translate(45, 340)">
            <!-- Agent 1 -->
            <rect x="0" y="0" width="310" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="32" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#E4E9F4">1. 數據 Agent (Data)</text>
            <text x="20" y="55" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">自然語言轉 SQL / API 查詢</text>

            <!-- Agent 2 -->
            <rect x="0" y="95" width="310" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="127" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#E4E9F4">2. 時程管理 Agent (Timeline)</text>
            <text x="20" y="150" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">進度自動查核與 Teams 智慧催辦</text>

            <!-- Agent 3 -->
            <rect x="0" y="190" width="310" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="222" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#E4E9F4">3. 提案 Agent (Innovation)</text>
            <text x="20" y="245" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">外部競品分析與 PRD 自動擴充</text>

            <!-- Agent 4 -->
            <rect x="0" y="285" width="310" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="317" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#E4E9F4">4. KPI 管理 Agent (KPI)</text>
            <text x="20" y="340" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">季度目標對比與 Gap 分析警示</text>

            <!-- Agent 5 -->
            <rect x="0" y="380" width="310" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="412" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#E4E9F4">5. 會議記錄 Agent (Meeting)</text>
            <text x="20" y="435" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">待辦事項提取與 Jira 自動開單</text>
        </g>
    </g>

    <!-- 中間：Power Automate Flow 邏輯調度區 (寬度 900, 高度 880) -->
    <g transform="translate(510, 145)">
        <rect width="900" height="880" fill="#0f1827" stroke="rgba(171, 188, 207, 0.15)" stroke-width="2" rx="16" filter="url(#card-shadow)"/>
        <text x="450" y="45" font-family="'Noto Sans TC', sans-serif" font-size="20" font-weight="bold" fill="#DAA360" text-anchor="middle" letter-spacing="1">Power Automate Flow 後端自動化與邏輯調度</text>
        <line x1="30" y1="65" x2="870" y2="65" stroke="rgba(171, 188, 207, 0.2)" stroke-width="1.5"/>

        <!-- 通道 1 -->
        <g transform="translate(30, 90)">
            <rect width="840" height="110" fill="#25334a" stroke="rgba(171, 188, 207, 0.15)" rx="10"/>
            <text x="25" y="32" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">數據查詢流程 (Query Flow)</text>
            <g font-family="'Noto Sans TC', sans-serif" font-size="12.5" fill="#ABBCCF" transform="translate(25, 65)">
                <text x="0" y="0">1. PVA 接收自然語言輸入</text>
                <text x="180" y="0" fill="#DAA360">➜</text>
                <text x="205" y="0">2. Azure OpenAI Text-to-API 轉換</text>
                <text x="465" y="0" fill="#DAA360">➜</text>
                <text x="490" y="0">3. 呼叫神策 API 與 Cube 資料庫</text>
                <text x="735" y="0" fill="#DAA360">➜</text>
                <text x="755" y="0" fill="#ffffff" font-weight="bold">回傳 Markdown</text>
            </g>
        </g>

        <!-- 通道 2 -->
        <g transform="translate(30, 230)">
            <rect width="840" height="110" fill="#25334a" stroke="rgba(171, 188, 207, 0.15)" rx="10"/>
            <text x="25" y="32" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">時程管理與智慧催辦流程 (Timeline Flow)</text>
            <g font-family="'Noto Sans TC', sans-serif" font-size="12.5" fill="#ABBCCF" transform="translate(25, 65)">
                <text x="0" y="0">1. 排程自動觸發或被動查詢</text>
                <text x="195" y="0" fill="#DAA360">➜</text>
                <text x="220" y="0">2. 檢索 Planner / Jira 逾期工作</text>
                <text x="450" y="0" fill="#DAA360">➜</text>
                <text x="475" y="0">3. 智慧生成委婉 Teams 私訊</text>
                <text x="680" y="0" fill="#DAA360">➜</text>
                <text x="705" y="0" fill="#ffffff" font-weight="bold">發送 Teams 私訊</text>
            </g>
        </g>

        <!-- 通道 3 -->
        <g transform="translate(30, 370)">
            <rect width="840" height="110" fill="#25334a" stroke="rgba(171, 188, 207, 0.15)" rx="10"/>
            <text x="25" y="32" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">提案與市場分析流程 (Innovation Flow)</text>
            <g font-family="'Noto Sans TC', sans-serif" font-size="12.5" fill="#ABBCCF" transform="translate(25, 65)">
                <text x="0" y="0">1. PM 輸入點子構想</text>
                <text x="165" y="0" fill="#DAA360">➜</text>
                <text x="190" y="0">2. Public Website Web Search 檢索</text>
                <text x="460" y="0" fill="#DAA360">➜</text>
                <text x="485" y="0">3. 產生競品對比矩陣與 User Story</text>
                <text x="745" y="0" fill="#DAA360">➜</text>
                <text x="765" y="0" fill="#ffffff" font-weight="bold">回傳大綱</text>
            </g>
        </g>

        <!-- 通道 4 -->
        <g transform="translate(30, 510)">
            <rect width="840" height="110" fill="#25334a" stroke="rgba(171, 188, 207, 0.15)" rx="10"/>
            <text x="25" y="32" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">目標落差分析流程 (KPI Flow)</text>
            <g font-family="'Noto Sans TC', sans-serif" font-size="12.5" fill="#ABBCCF" transform="translate(25, 65)">
                <text x="0" y="0">1. 讀取 SharePoint 季度目標</text>
                <text x="200" y="0" fill="#DAA360">➜</text>
                <text x="225" y="0">2. 撈取 Cube / 神策目前累計數據</text>
                <text x="465" y="0" fill="#DAA360">➜</text>
                <text x="490" y="0">3. 自動計算 Gap 並推薦補救策略</text>
                <text x="745" y="0" fill="#DAA360">➜</text>
                <text x="765" y="0" fill="#ffffff" font-weight="bold">發送警示</text>
            </g>
        </g>

        <!-- 通道 5 (縮短文字以防 overflow) -->
        <g transform="translate(30, 650)">
            <rect width="840" height="165" fill="#25334a" stroke="#DAA360" stroke-width="1.5" rx="10"/>
            <text x="25" y="35" font-family="'Noto Sans TC', sans-serif" font-size="16" font-weight="bold" fill="#DAA360">會議記錄與自動派單閉環流程 (Meeting Flow - Core Closed Loop)</text>
            <g font-family="'Noto Sans TC', sans-serif" font-size="12.5" fill="#E4E9F4" transform="translate(25, 75)">
                <text x="0" y="0">1. 貼上會議逐字稿文字</text>
                <text x="180" y="0" fill="#DAA360">➜</text>
                <text x="210" y="0">2. Azure OpenAI 提取 Action Items</text>
                <text x="470" y="0" fill="#DAA360">➜</text>
                <text x="500" y="0">3. 返回 Copilot 呈現結論並詢問派單</text>
            </g>
            <path d="M 420,95 L 420,120" stroke="#DAA360" stroke-width="2" fill="none"/>
            <polygon points="420,126 416,116 424,116" fill="#DAA360"/>
            <text x="420" y="145" font-family="'Noto Sans TC', sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">4. 呼叫 Jira / Planner API 進行自動分派開單</text>
        </g>
    </g>

    <!-- 右側：資料庫與安規控管 (寬度 400, 高度 880) -->
    <g transform="translate(1460, 145)">
        <rect width="400" height="880" fill="#0f1827" stroke="rgba(171, 188, 207, 0.15)" stroke-width="2" rx="16" filter="url(#card-shadow)"/>
        <text x="200" y="45" font-family="'Noto Sans TC', sans-serif" font-size="20" font-weight="bold" fill="#DAA360" text-anchor="middle" letter-spacing="1">企業系統與資料來源</text>
        <line x1="30" y1="65" x2="370" y2="65" stroke="rgba(171, 188, 207, 0.2)" stroke-width="1.5"/>

        <!-- 串接端卡片 -->
        <g transform="translate(30, 90)">
            <!-- 數據源 -->
            <rect x="0" y="0" width="340" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="32" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">數據存取端 (Cube &amp; Sensors Data)</text>
            <text x="20" y="55" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">對接神策行為分析 API 與內部交易資料庫</text>

            <!-- 專案工具 -->
            <rect x="0" y="95" width="340" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="127" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">專案管理端 (Jira &amp; Planner)</text>
            <text x="20" y="150" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">呼叫 Jira REST API 自動開立任務工單</text>

            <!-- 溝通工具 -->
            <rect x="0" y="190" width="340" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="222" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">即時協作端 (Teams Channel)</text>
            <text x="20" y="245" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">發送智慧催辦 Teams 卡片訊息</text>

            <!-- KPI 目標 -->
            <rect x="0" y="285" width="340" height="75" fill="#172439" stroke="rgba(171, 188, 207, 0.15)" rx="8"/>
            <text x="20" y="317" font-family="'Noto Sans TC', sans-serif" font-size="14" font-weight="bold" fill="#ffffff">企業儲存端 (SharePoint Excel)</text>
            <text x="20" y="340" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#ABBCCF">讀取設定好的季度 KPI 目標配置檔案</text>
        </g>

        <!-- 資安防護隔離區 (DLP & Guardrails) -->
        <rect x="30" y="485" width="340" height="355" fill="rgba(196, 56, 38, 0.05)" stroke="#C43826" stroke-width="2" rx="10"/>
        <text x="200" y="525" font-family="'Noto Sans TC', sans-serif" font-size="16" font-weight="bold" fill="#C43826" text-anchor="middle">資安控管與防護政策 (DLP)</text>
        <line x1="50" y1="545" x2="350" y2="545" stroke="rgba(196, 56, 38, 0.2)" stroke-width="1.5"/>
        
        <g font-family="'Noto Sans TC', sans-serif" font-size="13" fill="#E4E9F4" transform="translate(50, 580)">
            <text x="0" y="0">1. Azure AD SSO 單一登入整合</text>
            <text x="0" y="35">2. API 連動 Windows 使用者權限</text>
            <text x="0" y="70">3. 交易數據與個資動態去識別化</text>
            <text x="0" y="105">4. 資料傳輸全程 TLS 1.3 軌道加密</text>
            <text x="0" y="140">5. 嚴格落實防資料洩漏 (DLP) 策略</text>
            <text x="0" y="175">6. 敏感資料定時清除機制 (GDPR)</text>
            <text x="0" y="210">7. 限制禁止串接非授權外部 API</text>
        </g>
    </g>

    <!-- 中央流程連接虛線 (左到中，中到右) -->
    <!-- 左區到中區 -->
    <path d="M 460,250 L 510,250" stroke="#ABBCCF" stroke-width="1.5" stroke-dasharray="6,6" fill="none"/>
    <path d="M 460,390 L 510,390" stroke="#ABBCCF" stroke-width="1.5" stroke-dasharray="6,6" fill="none"/>
    <path d="M 460,530 L 510,530" stroke="#ABBCCF" stroke-width="1.5" stroke-dasharray="6,6" fill="none"/>
    <path d="M 460,670 L 510,670" stroke="#ABBCCF" stroke-width="1.5" stroke-dasharray="6,6" fill="none"/>
    
    <!-- 中區到右區 -->
    <path d="M 1410,230 L 1460,230" stroke="#ABBCCF" stroke-width="2" fill="none"/>
    <polygon points="1460,230 1450,225 1450,235" fill="#ABBCCF"/>
    
    <path d="M 1410,370 L 1460,370" stroke="#ABBCCF" stroke-width="2" fill="none"/>
    <polygon points="1460,370 1450,365 1450,375" fill="#ABBCCF"/>
    
    <path d="M 1410,510 L 1460,510" stroke="#ABBCCF" stroke-width="2" fill="none"/>
    <polygon points="1460,510 1450,505 1450,515" fill="#ABBCCF"/>

    <path d="M 1410,650 L 1460,650" stroke="#DAA360" stroke-width="2.5" fill="none"/>
    <polygon points="1460,650 1448,644 1448,656" fill="#DAA360"/>
</svg>
